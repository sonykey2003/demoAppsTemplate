# ─────────────────────────────────────────────────────────────────────────────
# secret.example.yaml — EXAMPLE ONLY: placeholders, NOT real credentials
#
# The Database Agent needs:
#   • controller-key       — the AppDynamics account access key (agent registration)
#   • db-monitor-password  — password for the PostgreSQL `appd_dbmon` monitoring role
#
# Create the real secret with (do NOT commit real values):
#
#   kubectl -n appdynamics create secret generic appd-dbagent-secret \
#     --from-literal=controller-key='<ACCESS_KEY>' \
#     --from-literal=db-monitor-password='<DB_MONITOR_PASSWORD>'
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: appd-dbagent-secret
  namespace: appdynamics
type: Opaque
data:
  # echo -n 'REPLACE_ME' | base64  → UkVQTEFDRV9NRQ==
  controller-key: UkVQTEFDRV9NRQ==
  db-monitor-password: UkVQTEFDRV9NRQ==
