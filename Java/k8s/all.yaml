---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: container-service
    app.kubernetes.io/name: port-ops-demo
    app.kubernetes.io/part-of: port-ops-demo
    app.kubernetes.io/version: 0.1.0
  name: container-service
  namespace: port-ops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: container-service
  template:
    metadata:
      labels:
        app.kubernetes.io/component: container-service
        app.kubernetes.io/name: port-ops-demo
        app.kubernetes.io/part-of: port-ops-demo
        app.kubernetes.io/version: 0.1.0
    spec:
      containers:
      - env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres.port-ops-demo.svc.cluster.local:5432/containerdb
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              key: username
              name: port-ops-postgres
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: port-ops-postgres
        - name: SPRING_DATA_REDIS_HOST
          value: redis
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        image: localhost/port-ops-demo/container-service:0.1.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 9082
          initialDelaySeconds: 20
          periodSeconds: 10
        name: container-service
        ports:
        - containerPort: 9082
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 9082
          initialDelaySeconds: 20
          periodSeconds: 10
        resources:
          limits:
            cpu: "1"
            memory: 768Mi
          requests:
            cpu: 250m
            memory: 256Mi
        startupProbe:
          failureThreshold: 24
          httpGet:
            path: /healthz
            port: 9082
          periodSeconds: 5
---
