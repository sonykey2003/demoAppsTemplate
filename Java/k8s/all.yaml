apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/name: port-ops-demo
    app.kubernetes.io/part-of: port-ops-demo
    app.kubernetes.io/version: "16"
  name: postgres
  namespace: port-ops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        app.kubernetes.io/name: port-ops-demo
        app.kubernetes.io/part-of: port-ops-demo
        app.kubernetes.io/version: "16"
    spec:
      containers:
      - env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: username
              name: port-ops-postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: port-ops-postgres
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        image: postgres:16
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
          initialDelaySeconds: 20
          periodSeconds: 10
        name: postgres
        ports:
        - containerPort: 5432
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: "1"
            memory: 768Mi
          requests:
            cpu: 250m
            memory: 256Mi
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
        - mountPath: /docker-entrypoint-initdb.d
          name: init-sql
      securityContext:
        fsGroup: 999
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: port-ops-postgres-pvc
      - configMap:
          name: port-ops-postgres-init-sql
        name: init-sql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: redis
    app.kubernetes.io/name: port-ops-demo
    app.kubernetes.io/part-of: port-ops-demo
    app.kubernetes.io/version: "7"
  name: redis
  namespace: port-ops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
        app.kubernetes.io/name: port-ops-demo
        app.kubernetes.io/part-of: port-ops-demo
        app.kubernetes.io/version: "7"
    spec:
      containers:
      - command:
        - redis-server
        - --appendonly
        - "no"
        - --save
        - ""
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
        name: redis
        ports:
        - containerPort: 6379
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
