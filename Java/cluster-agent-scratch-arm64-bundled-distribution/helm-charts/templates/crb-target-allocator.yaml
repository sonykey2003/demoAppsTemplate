{{ if .Values.installClusterAgent -}}
{{ if .Values.targetAllocator.enabled -}}
{{ $targetAllocatorSA := .Values.targetAllocatorServiceAccount }}
{{ $namespace := .Release.Namespace }}
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ printf "%s-%s" .Release.Name "appdynamics-target-allocator" }}
subjects:
  - kind: ServiceAccount
    name: {{ $targetAllocatorSA }}
    namespace: {{ $namespace }}
roleRef:
  kind: ClusterRole
  name: appdynamics-target-allocator-{{.Release.Name}}
  apiGroup: rbac.authorization.k8s.io
{{ end -}}
{{ end -}}