{{ if .Values.installInfraViz -}}
{{ $agentSA := .Values.infravizServiceAccount }}
{{ $namespace := .Release.Namespace }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-%s" .Release.Name "appdynamics-infraviz" }}
subjects:
{{ printf "- kind: ServiceAccount" | nindent 2 }}
{{ printf "name: %s" $agentSA | nindent 4 }}
{{ printf "namespace: %s" $namespace | nindent 4}}
roleRef:
  kind: ClusterRole
  name: appdynamics-infraviz-{{.Release.Name}}
  apiGroup: rbac.authorization.k8s.io
{{ end -}}