{{ if .Values.installInfraViz -}}
{{- if .Capabilities.APIVersions.Has "security.openshift.io/v1" -}}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  annotations:
    kubernetes.io/description: 'infraviz-privileged-scc is a custom SCC for AppDynamics infraviz'
  name: infraviz-privileged-scc
  namespace: {{ .Release.Namespace }}
allowHostDirVolumePlugin: true
allowHostIPC: true
allowHostNetwork: true
allowHostPID: true
allowHostPorts: true
allowPrivilegedContainer: true
readOnlyRootFilesystem: false
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
users:
  - system:serviceaccount:{{ .Release.Namespace }}:{{ .Values.infravizServiceAccount }}
{{- end }}
{{- end }}