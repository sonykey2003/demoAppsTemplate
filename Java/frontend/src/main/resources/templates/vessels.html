<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Vessels – Port Ops</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<nav th:replace="~{layout :: header}"></nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Vessels</h2>
    <span class="badge bg-secondary" th:text="${vessels.size()} + ' total'"></span>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>Code</th><th>Name</th><th>IMO</th><th>Length (m)</th><th>Created</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(vessels)}">
          <td colspan="5" class="text-center text-muted">No vessels found</td>
        </tr>
        <tr th:each="v : ${vessels}">
          <td class="font-monospace fw-bold" th:text="${v.code()}"></td>
          <td th:text="${v.name()}"></td>
          <td th:text="${v.imo()}"></td>
          <td th:text="${v.lengthM()}"></td>
          <td class="small text-muted" th:text="${v.createdAt()}"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
