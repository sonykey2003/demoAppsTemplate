<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Job Detail – Port Ops</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<nav th:replace="~{layout :: header}"></nav>

<div class="container mt-4">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="/" class="btn btn-outline-secondary btn-sm">&larr; Dashboard</a>
    <h2 class="mb-0">Job Detail</h2>
    <span class="badge fs-6"
          th:classappend="${job.status() == 'COMPLETED'} ? 'bg-success' : (${job.status() == 'FAILED'} ? 'bg-danger' : 'bg-warning text-dark')"
          th:text="${job.status()}"></span>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <dl class="row mb-0">
        <dt class="col-sm-3">Job ID</dt>
        <dd class="col-sm-9 font-monospace" th:text="${job.id()}"></dd>

        <dt class="col-sm-3">Vessel</dt>
        <dd class="col-sm-9 fw-bold" th:text="${job.vesselCode()}"></dd>

        <dt class="col-sm-3">Container</dt>
        <dd class="col-sm-9">
          <a th:href="@{/containers/{id}(id=${job.containerId()})}" th:text="${job.containerId()}"></a>
        </dd>

        <dt class="col-sm-3">Operation</dt>
        <dd class="col-sm-9"><span class="badge bg-info text-dark" th:text="${job.operationType()}"></span></dd>

        <dt class="col-sm-3">Terminal</dt>
        <dd class="col-sm-9" th:text="${job.terminalId()}"></dd>

        <dt class="col-sm-3">Created</dt>
        <dd class="col-sm-9 text-muted" th:text="${job.createdAt()}"></dd>

        <dt class="col-sm-3">Started</dt>
        <dd class="col-sm-9 text-muted" th:text="${job.startedAt() != null ? job.startedAt() : '—'}"></dd>

        <dt class="col-sm-3">Completed</dt>
        <dd class="col-sm-9 text-muted" th:text="${job.completedAt() != null ? job.completedAt() : '—'}"></dd>

        <dt class="col-sm-3">Duration</dt>
        <dd class="col-sm-9" th:text="${job.durationSeconds() != null ? job.durationSeconds() + ' s' : '—'}"></dd>
      </dl>
    </div>
  </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
