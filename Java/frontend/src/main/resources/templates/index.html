<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Dashboard – Port Ops</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<nav th:replace="~{layout :: header}"></nav>

<div class="container mt-4">
  <h2 class="mb-4">Operations Dashboard</h2>

  <!-- Summary cards -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card text-white brand-card-primary">
        <div class="card-body">
          <h6 class="card-title">Vessels</h6>
          <p class="card-text display-6 fw-bold" th:text="${dashboard.vesselCount()}">0</p>
          <a href="/vessels" class="text-white small">View all &rarr;</a>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-white bg-secondary">
        <div class="card-body">
          <h6 class="card-title">Containers</h6>
          <p class="card-text display-6 fw-bold" th:text="${dashboard.containerCount()}">0</p>
          <a href="/containers" class="text-white small">View all &rarr;</a>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-white bg-success">
        <div class="card-body">
          <h6 class="card-title">Recent Jobs</h6>
          <p class="card-text display-6 fw-bold" th:text="${dashboard.recentJobs().size()}">0</p>
          <a href="/jobs/new" class="text-white small">Create job &rarr;</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Recent jobs table -->
  <h5>Recent Jobs (last 10)</h5>
  <div class="table-responsive">
    <table class="table table-striped table-hover table-sm">
      <thead class="table-dark">
        <tr>
          <th>ID</th><th>Vessel</th><th>Container</th>
          <th>Operation</th><th>Terminal</th><th>Status</th><th>Created</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(dashboard.recentJobs())}">
          <td colspan="7" class="text-center text-muted">No jobs found</td>
        </tr>
        <tr th:each="job : ${dashboard.recentJobs()}">
          <td><a th:href="@{/jobs/{id}(id=${job.id()})}" th:text="${job.id()}" class="font-monospace small"></a></td>
          <td th:text="${job.vesselCode()}"></td>
          <td th:text="${job.containerId()}"></td>
          <td><span class="badge bg-info text-dark" th:text="${job.operationType()}"></span></td>
          <td th:text="${job.terminalId()}"></td>
          <td>
            <span class="badge"
                  th:classappend="${job.status() == 'COMPLETED'} ? 'bg-success' : (${job.status() == 'FAILED'} ? 'bg-danger' : 'bg-warning text-dark')"
                  th:text="${job.status()}"></span>
          </td>
          <td class="small" th:text="${job.createdAt()}"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
