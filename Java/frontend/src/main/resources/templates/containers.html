<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Containers – Port Ops</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<nav th:replace="~{layout :: header}"></nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Containers</h2>
    <span class="badge bg-secondary" th:text="${containers.size()} + ' total'"></span>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th><th>ISO Type</th><th>Weight (kg)</th><th>Status</th>
          <th>Created</th><th>Last Moved</th><th>Turnaround</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(containers)}">
          <td colspan="7" class="text-center text-muted">No containers found</td>
        </tr>
        <tr th:each="c : ${containers}">
          <td class="font-monospace fw-bold" th:text="${c.id()}"></td>
          <td th:text="${c.isoType()}"></td>
          <td th:text="${c.weightKg()}"></td>
          <td>
            <span class="badge"
                  th:classappend="${c.status() == 'ON_VESSEL'} ? 'bg-primary' : (${c.status() == 'GATE_OUT' or c.status() == 'DELIVERED'} ? 'bg-success' : 'bg-secondary')"
                  th:text="${c.status()}"></span>
          </td>
          <td class="small text-muted" th:text="${c.createdAt()}"></td>
          <td class="small text-muted" th:text="${c.lastMovedAt() != null ? c.lastMovedAt() : '—'}"></td>
          <td>
            <a th:href="@{/containers/{id}(id=${c.id()})}" class="btn btn-sm btn-outline-primary">
              View
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
