<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Container Turnaround – Port Ops</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<nav th:replace="~{layout :: header}"></nav>

<div class="container mt-4" style="max-width:600px;">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="/containers" class="btn btn-outline-secondary btn-sm">&larr; Containers</a>
    <h2 class="mb-0">Turnaround Detail</h2>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <dl class="row mb-0">
        <dt class="col-sm-4">Container ID</dt>
        <dd class="col-sm-8 font-monospace fw-bold" th:text="${turnaround.containerId()}"></dd>

        <dt class="col-sm-4">Status</dt>
        <dd class="col-sm-8">
          <span class="badge bg-secondary" th:text="${turnaround.status()}"></span>
        </dd>

        <dt class="col-sm-4">Created</dt>
        <dd class="col-sm-8 text-muted" th:text="${turnaround.createdAt()}"></dd>

        <dt class="col-sm-4">Last Moved</dt>
        <dd class="col-sm-8 text-muted"
            th:text="${turnaround.lastMovedAt() != null ? turnaround.lastMovedAt() : '—'}"></dd>

        <dt class="col-sm-4">Turnaround</dt>
        <dd class="col-sm-8 fw-bold fs-5"
            th:text="${turnaround.turnaroundMinutes() + ' min'}"></dd>

        <dt class="col-sm-4">Complete</dt>
        <dd class="col-sm-8">
          <span th:if="${turnaround.isComplete()}" class="badge bg-success">Yes</span>
          <span th:unless="${turnaround.isComplete()}" class="badge bg-warning text-dark">In Progress</span>
        </dd>
      </dl>
    </div>
  </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
