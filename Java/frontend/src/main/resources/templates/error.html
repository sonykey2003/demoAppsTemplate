<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Error – Port Ops</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<nav th:replace="~{layout :: header}"></nav>

<div class="container mt-5" style="max-width:640px;">
  <div class="alert alert-danger shadow-sm" role="alert">
    <h4 class="alert-heading" th:text="${errorTitle ?: 'Error'}"></h4>
    <hr/>
    <p th:text="${errorMessage}"></p>
    <dl class="row small mb-0">
      <dt class="col-sm-4">Error Code</dt>
      <dd class="col-sm-8 font-monospace" th:text="${errorCode ?: '—'}"></dd>

      <dt class="col-sm-4">Service</dt>
      <dd class="col-sm-8" th:text="${serviceName ?: '—'}"></dd>

      <dt class="col-sm-4">HTTP Status</dt>
      <dd class="col-sm-8" th:text="${statusCode ?: '—'}"></dd>

      <dt class="col-sm-4">Trace ID</dt>
      <dd class="col-sm-8 font-monospace text-break"
          th:text="${(traceId != null and !traceId.isEmpty()) ? traceId : '(not sampled)'}"></dd>
    </dl>
  </div>

  <a href="/" class="btn btn-primary">&larr; Back to Dashboard</a>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
